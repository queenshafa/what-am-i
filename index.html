<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css" />
    <title>What am I?</title>
  </head>
  <body
    class="font-helvetica bg-white lg:bg-primary text-center lg:px-5 lg:py-5"
  >
    <div
      class="grid-bg h-[calc(100vh-40px)] flex flex-col items-center bg-white lg:rounded-3xl p-0"
    >
      <div class="bg-primary p-3 border-4 border-white shadow rounded-2xl mt-4">
        <p>
          Fun fact: You're the <span id="visits" class="font-bold">10</span>th
          visitor.
        </p>
      </div>
      <h1 class="font-bold text-7xl lg:text-8xl pt-6">
        What <span class="bg-primary px-1.5">Am I?</span>
      </h1>
      <p class="pt-6 font-medium text-lg">
        Check what are you based on your birth year!
      </p>
      <p class="pt-12 font-medium text-lg lg:pt-6">
        I was <span class="bg-primary p-0.5">born</span> on..
      </p>
      <div class="flex justify-center items-center gap-6 pt-4">
        <input
          type="number"
          name=""
          id="yearInput"
          placeholder="1945"
          class="w-25 bg-white border-8 border-primary rounded-full p-2 text-center drop-shadow-lg font-bold text-2xl"
        />
        <button
          class="bg-primary text-black border-8 border-white rounded-full px-10 py-3 text-center drop-shadow-lg font-bold text-lg"
        >
          Check!
        </button>
      </div>
      <p class="pt-6 font-medium text-lg">Well, you're a/an..</p>
      <!-- the card -->
      <div
        class="max-w-sm flex flex-col items-center justify-center bg-primary p-6 m-4 border-8 border-white rounded-2xl shadow-2xl"
      >
        <img src="/assets/unc.png" alt="" />
        <h2 class="font-bold text-2xl pt-4">unc</h2>
        <p>u da real unc</p>
      </div>
      <footer class="flex flex-col justify-center items-center">
        <p class="absolute bottom-5 lg:bottom-10">
          Made with ♡ by
          <a
            href="https://github.com/queenshafa/"
            target="_blank"
            class="bg-primary p-1.5"
            >queenshafarania</a
          >
        </p>
      </footer>
    </div>
  </body>
</html>
